<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headboss Treatment - Live Queue</title>
    
    <!-- External Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Project Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                        anton: ['Anton', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        primary: '#ffffff',
                        background: '#000000',
                        card: '#0a0a0a',
                        border: '#1a1a1a',
                        accent: '#ffcc00'
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #000000; color: #ffffff; overflow: hidden; }
        .grain-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50; opacity: 0.05;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="grain-overlay"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Configuration ---
        const POS_API_ENDPOINT = 'YOUR_POS_API_URL_HERE'; // Replace with your actual API URL
        const REFRESH_INTERVAL = 30000; // 30 seconds
        const SHOP_NAME = "HEADBOSS TREATMENT";
        const LOGO_URL = "https://vgbujcuwptvheqijyjbe.supabase.co/storage/v1/object/public/hmac-uploads/uploads/2c1339d0-1c66-42f7-9d81-ba4edb5c1d7e/1767368115629-e80b672d/6a89bfb2-8761-47b9-b92e-95af78602972.png";

        // --- Mock Data (Replace with API call) ---
        const MOCK_DATA = {
            nowServing: [
                { id: 1, ticket: '088', name: 'FAJAR PRATAMA', barber: 'ANDI', service: 'Classic Cut & Shave' },
                { id: 2, ticket: '089', name: 'EKO SULISTYO', barber: 'BUDI', service: 'Grooming Treatment' },
            ],
            upNext: [
                { id: 3, ticket: '090', name: 'FERDIANSYAH', service: 'Signature Headboss' },
                { id: 4, ticket: '091', name: 'HENDRA WIJAYA', service: 'Hot Towel Shave' },
            ],
            waitingList: [
                { id: 5, ticket: '092', name: 'GILANG RAMADHAN', est: '15m' },
                { id: 6, ticket: '093', name: 'JAYA KUSUMA', est: '30m' },
                { id: 7, ticket: '094', name: 'RIDHO ILAHI', est: '45m' },
                { id: 8, ticket: '095', name: 'ANTO WIJAYA', est: '60m' },
            ]
        };

        const App = () => {
            const [data, setData] = useState(MOCK_DATA);
            const [time, setTime] = useState(new Date());
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                const sync = setInterval(() => {
                    setIsSyncing(true);
                    // Fetch from your POS API here:
                    // fetch(POS_API_ENDPOINT).then(res => res.json()).then(newData => setData(newData)).finally(() => setIsSyncing(false));
                    setTimeout(() => setIsSyncing(false), 1000);
                }, REFRESH_INTERVAL);

                return () => { clearInterval(timer); clearInterval(sync); };
            }, []);

            const formattedTime = time.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const formattedDate = time.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            return (
                <div className="min-h-screen bg-black text-white p-8 flex flex-col font-sans">
                    {/* Header */}
                    <header className="flex items-center justify-between border-b border-white/10 pb-8 mb-12">
                        <div className="flex items-center gap-8">
                            <img src={LOGO_URL} alt="Logo" className="h-14 brightness-0 invert" />
                            <div className="h-12 w-px bg-white/10"></div>
                            <div>
                                <h1 className="text-3xl font-anton tracking-widest uppercase">{SHOP_NAME}</h1>
                                <div className="flex items-center gap-2 text-xs font-mono text-white/40 tracking-[0.3em] uppercase">
                                    <span className={`w-2 h-2 rounded-full ${isSyncing ? 'bg-blue-500 animate-pulse' : 'bg-emerald-500'}`}></span>
                                    {isSyncing ? 'Syncing POS...' : 'System Live'}
                                </div>
                            </div>
                        </div>
                        <div className="text-right font-mono">
                            <div className="text-5xl font-bold tracking-tight">{formattedTime}</div>
                            <div className="text-[10px] text-white/30 mt-1 uppercase tracking-[0.3em]">{formattedDate}</div>
                        </div>
                    </header>

                    {/* Content Grid */}
                    <div className="flex-1 grid grid-cols-12 gap-12 overflow-hidden">
                        
                        {/* Now Serving */}
                        <section className="col-span-5 flex flex-col">
                            <h2 className="text-[10px] font-mono text-white/30 uppercase tracking-[0.4em] mb-8 flex items-center gap-2">
                                <i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i> Now Serving
                            </h2>
                            <div className="space-y-6 overflow-y-auto custom-scrollbar pr-4">
                                <AnimatePresence mode="popLayout">
                                    {data.nowServing.map(item => (
                                        <motion.div 
                                            key={item.id}
                                            initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }}
                                            className="bg-card border border-border p-8 rounded-sm relative overflow-hidden group"
                                        >
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="text-7xl font-anton tracking-tighter text-white">#{item.ticket}</div>
                                                <div className="text-right">
                                                    <p className="text-[10px] text-white/30 uppercase tracking-widest mb-1 font-mono">Barber</p>
                                                    <p className="text-xl font-serif italic font-bold">{item.barber}</p>
                                                </div>
                                            </div>
                                            <div className="border-t border-white/5 pt-6">
                                                <h3 className="text-3xl font-serif font-bold italic mb-1">{item.name}</h3>
                                                <p className="text-xs text-white/40 font-mono uppercase tracking-[0.2em]">{item.service}</p>
                                            </div>
                                        </motion.div>
                                    ))}
                                </AnimatePresence>
                            </div>
                        </section>

                        {/* Up Next */}
                        <section className="col-span-3 flex flex-col">
                            <h2 className="text-[10px] font-mono text-white/30 uppercase tracking-[0.4em] mb-8 flex items-center gap-2">
                                <i data-lucide="arrow-right" class="w-4 h-4 text-blue-500"></i> Up Next
                            </h2>
                            <div className="space-y-4">
                                {data.upNext.map(item => (
                                    <div key={item.id} className="bg-card border-l-4 border-l-blue-500 border border-border p-5">
                                        <div className="font-mono text-2xl font-bold mb-2">#{item.ticket}</div>
                                        <h4 className="text-lg font-serif font-bold italic leading-tight">{item.name}</h4>
                                        <p className="text-[10px] text-white/30 uppercase font-mono mt-1">{item.service}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Waiting List */}
                        <section className="col-span-4 flex flex-col bg-white/[0.02] p-6 rounded-sm border border-white/5">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-[10px] font-mono text-white/30 uppercase tracking-[0.4em]">Waiting List</h2>
                                <div className="text-[10px] font-mono text-white/30 uppercase flex items-center gap-2">
                                    <i data-lucide="clock" class="w-3 h-3"></i> Avg: 20m
                                </div>
                            </div>
                            <div className="space-y-3 overflow-y-auto custom-scrollbar">
                                {data.waitingList.map((item, idx) => (
                                    <div key={item.id} className="flex items-center justify-between bg-card border border-border p-4 rounded-sm">
                                        <div className="flex items-center gap-4">
                                            <span className="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center font-mono text-xs text-white/40">{idx + 1}</span>
                                            <div>
                                                <h5 className="text-sm font-serif font-bold italic">{item.name}</h5>
                                                <p className="text-[9px] font-mono text-white/20 uppercase">#{item.ticket}</p>
                                            </div>
                                        </div>
                                        <div className="text-[10px] font-mono text-white/40 uppercase">Est. {item.est}</div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </div>

                    {/* Footer Info */}
                    <footer className="mt-12 flex items-center justify-between text-[10px] font-mono text-white/20 uppercase tracking-[0.4em] pt-8 border-t border-white/5">
                        <div className="flex gap-12">
                            <span>Serving: {data.nowServing.length}</span>
                            <span>Waiting: {data.waitingList.length}</span>
                        </div>
                        <div className="flex gap-12">
                            <span>Status: Operational</span>
                            <span>Wifi: Headboss_Guest</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

        // Initialize Lucide icons after rendering
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
